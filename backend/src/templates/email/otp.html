<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Your verification code</title></head>
<body style="margin:0;padding:0;background:#EEF4F7;font-family:'Helvetica Neue',Arial,sans-serif;color:#1B3A5B;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:32px 16px;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(27,58,91,0.08);">
        <tr><td style="background:#1B3A5B;padding:28px 32px;text-align:center;">
          <h1 style="margin:0;color:#C5A84C;font-size:24px;">{{appName}}</h1>
        </td></tr>
        <tr><td style="padding:32px;text-align:center;">
          <p style="margin:0 0 16px;font-size:16px;color:#3a4a5e;">Your verification code is:</p>
          <div style="display:inline-block;padding:18px 32px;background:#EEF4F7;border-radius:10px;font-size:36px;font-weight:700;letter-spacing:10px;color:#1B3A5B;">{{code}}</div>
          <p style="margin:24px 0 0;font-size:13px;color:#9aa6b3;">
            This code expires in {{expiresIn}}. Do not share it with anyone.
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
