<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Reset password</title></head>
<body style="margin:0;padding:0;background:#EEF4F7;font-family:'Helvetica Neue',Arial,sans-serif;color:#1B3A5B;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:32px 16px;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(27,58,91,0.08);">
        <tr><td style="background:#1B3A5B;padding:28px 32px;text-align:center;">
          <h1 style="margin:0;color:#C5A84C;font-size:24px;">{{appName}}</h1>
        </td></tr>
        <tr><td style="padding:32px;">
          <h2 style="margin:0 0 12px;font-size:22px;">Hi {{name}},</h2>
          <p style="margin:0 0 20px;font-size:16px;line-height:1.6;color:#3a4a5e;">
            We received a request to reset your password. Click below to set a new one.
          </p>
          <table role="presentation" cellspacing="0" cellpadding="0" style="margin:20px 0;">
            <tr><td style="border-radius:8px;background:#C5A84C;">
              <a href="{{resetUrl}}" target="_blank" style="display:inline-block;padding:14px 28px;color:#1B3A5B;font-weight:700;text-decoration:none;font-size:16px;">
                Reset Password
              </a>
            </td></tr>
          </table>
          <p style="margin:0 0 8px;font-size:14px;color:#677484;">Or paste this link into your browser:</p>
          <p style="margin:0 0 24px;font-size:13px;word-break:break-all;"><a href="{{resetUrl}}" style="color:#13A8E8;">{{resetUrl}}</a></p>
          <p style="margin:0;font-size:13px;color:#9aa6b3;">
            This link expires in {{expiresIn}}. If you didn't request a reset, you can safely ignore this email.
          </p>
        </td></tr>
        <tr><td style="background:#f5f8fa;padding:18px 32px;text-align:center;font-size:12px;color:#9aa6b3;">
          &copy; {{appName}}.
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
