<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">DI</div>
      <h1>Forgot Password</h1>
      <p>Enter your email and we'll send a reset link</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" required />
      </div>
      <button id="btn" type="submit" class="btn btn-primary">
        <span class="spinner"></span><span class="label">Send reset link</span>
      </button>
    </form>

    <p class="form-footer"><a href="login.html">Back to sign in</a></p>
  </div>
</div>

<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
const alertEl = document.getElementById('alert');
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  UI.clearAlert(alertEl);
  UI.loading(btn, true);
  try {
    const res = await API.forgotPassword(document.getElementById('email').value.trim());
    UI.alert(alertEl, 'success', res.message);
  } catch (err) {
    UI.alert(alertEl, 'error', err.message);
  } finally { UI.loading(btn, false); }
});
</script>
</body>
</html>
