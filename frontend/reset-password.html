<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">DI</div>
      <h1>Reset Password</h1>
      <p>Choose a new password for your account</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="form" novalidate>
      <div class="form-group">
        <label for="pass">New password</label>
        <input id="pass" type="password" autocomplete="new-password" required minlength="8" />
        <div class="hint">Min 8 characters with uppercase, lowercase, and number.</div>
      </div>
      <div class="form-group">
        <label for="pass2">Confirm password</label>
        <input id="pass2" type="password" autocomplete="new-password" required minlength="8" />
      </div>
      <button id="btn" type="submit" class="btn btn-primary">
        <span class="spinner"></span><span class="label">Reset password</span>
      </button>
    </form>

    <p class="form-footer"><a href="login.html">Back to sign in</a></p>
  </div>
</div>

<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
const token = UI.qs('token');
const alertEl = document.getElementById('alert');
if (!token) {
  UI.alert(alertEl, 'error', 'Missing reset token. Please use the link from your email.');
  document.getElementById('btn').disabled = true;
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pass = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  if (pass !== pass2) {
    UI.alert(alertEl, 'error', 'Passwords do not match');
    return;
  }
  const btn = document.getElementById('btn');
  UI.clearAlert(alertEl);
  UI.loading(btn, true);
  try {
    const data = await API.resetPassword({ token, password: pass });
    if (data.data) API.setTokens(data.data);
    UI.alert(alertEl, 'success', 'Password reset successful. Redirecting…');
    setTimeout(() => location.href = 'dashboard.html', 1200);
  } catch (err) {
    UI.alert(alertEl, 'error', err.message);
  } finally { UI.loading(btn, false); }
});
</script>
</body>
</html>
